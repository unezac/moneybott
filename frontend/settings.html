<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Settings - Signal Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-gradient: radial-gradient(circle at top left, #0d121c 0%, #030407 100%);
  --surface: rgba(20, 25, 35, 0.4);
  --border: rgba(255, 255, 255, 0.05);
  --border-glow: rgba(0, 229, 255, 0.15);
  --text: #e2e8f0;
  --muted: #8ba0b8;
  --accent: #00e5ff;
  --accent-glow: 0 0 15px rgba(0, 229, 255, 0.4);
  --font-sans: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

body {
  min-height: 100vh;
  background: var(--bg-gradient);
  color: var(--text);
  font-family: var(--font-sans);
  overflow-x: hidden;
  display: flex; flex-direction: column; align-items: center;
  padding: 0 0 40px 0;
}

body::before {
  content:''; position:fixed; top:-50%; left:-20%; width:100%; height:100%;
  background: radial-gradient(circle, rgba(0,229,255,0.03) 0%, transparent 60%);
  pointer-events:none; z-index:-1;
}

/* ── top bar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 1px solid var(--border);
  background: rgba(10, 14, 20, 0.6); backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 100; width: 100%;
}
.logo { font-weight: 800; font-size: 18px; letter-spacing: 0.1em; color: #fff; text-transform: uppercase; }
.logo span.highlight { color: var(--accent); text-shadow: var(--accent-glow); }

.nav-links { display: flex; gap: 24px; margin-left: 32px; flex: 1; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s; }
.nav-links a.active, .nav-links a:hover { color: var(--accent); }

/* ── Form Card ── */
.card {
  background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border); border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  padding: 40px; width: 100%; max-width: 500px;
  margin-top: 60px;
}

.title { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text); margin-bottom: 30px; text-align: center; }

.form-group { margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }
label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
select, input {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text);
  padding: 12px 16px; font-family: var(--font-mono); font-size: 14px; border-radius: 8px;
  outline: none; transition: border-color 0.2s;
}
select:focus, input:focus { border-color: var(--accent); }

.btn {
  background: linear-gradient(135deg, rgba(0,229,255,0.2) 0%, rgba(0,229,255,0.05) 100%);
  border: 1px solid var(--accent); color: var(--accent);
  font-family: var(--font-sans); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
  padding: 14px; border-radius: 8px; cursor: pointer; width: 100%;
  box-shadow: var(--accent-glow); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  margin-top: 10px;
}
.btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 25px rgba(0,229,255,0.6); transform: translateY(-2px); }

#msg { margin-top: 20px; font-size: 13px; color: #00e676; text-align: center; display: none; font-weight: 600; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span class="highlight">ICT</span>/SMC Engine</div>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/history">History</a>
    <a href="/settings" class="active">Settings</a>
  </div>
</div>

<div class="card">
  <div class="title">Bot Configuration</div>
  
  <div class="form-group">
    <label>Stub Mode (Simulate without actual trade execution)</label>
    <select id="stub_mode">
      <option value="true">True (Safe Simulation)</option>
      <option value="false">False (Live Execution)</option>
    </select>
  </div>

  <div class="form-group">
    <label>ML Confidence Threshold (e.g. 0.70 = 70%)</label>
    <input type="number" step="0.01" id="threshold" value="0.70" />
  </div>

  <div class="form-group">
    <label>Force Retrain Model</label>
    <select id="retrain">
      <option value="false">False</option>
      <option value="true">True</option>
    </select>
  </div>

  <div class="form-group">
    <label>Use XGBoost Model</label>
    <select id="xgboost">
      <option value="false">False (Use RandomForest)</option>
      <option value="true">True (Use XGBoost)</option>
    </select>
  </div>

  <!-- MT5 Credentials -->
  <div style="margin: 32px 0 20px 0; border-top: 1px solid var(--border); padding-top: 24px;">
    <div style="font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; color:var(--accent); margin-bottom:4px;">MetaTrader 5 Connection</div>
    <div style="font-size:12px; color:var(--muted); margin-bottom:20px;">Used when Stub Mode is set to False. The MT5 terminal must be open & logged in.</div>
  </div>

  <div class="form-group">
    <label>MT5 Account Number</label>
    <input type="number" id="mt5_account" placeholder="e.g. 123456" />
  </div>

  <div class="form-group">
    <label>MT5 Password</label>
    <input type="password" id="mt5_password" placeholder="Your MT5 account password" />
  </div>

  <div class="form-group">
    <label>MT5 Server</label>
    <input type="text" id="mt5_server" placeholder='e.g. ICMarkets-Demo, Exness-Real' />
  </div>

  <button class="btn" onclick="saveSettings()">Save Configuration</button>
  <div id="msg">Settings saved successfully.</div>
</div>

<script>
async function loadSettings() {
  const res = await fetch('/api/settings');
  const data = await res.json();
  if(data.stub_mode)    document.getElementById('stub_mode').value = data.stub_mode;
  if(data.threshold)    document.getElementById('threshold').value = data.threshold;
  if(data.retrain)      document.getElementById('retrain').value = data.retrain;
  if(data.xgboost)      document.getElementById('xgboost').value = data.xgboost;
  if(data.mt5_account)  document.getElementById('mt5_account').value = data.mt5_account;
  if(data.mt5_password) document.getElementById('mt5_password').value = data.mt5_password;
  if(data.mt5_server)   document.getElementById('mt5_server').value = data.mt5_server;
}

async function saveSettings() {
  const payload = {
    stub_mode:    document.getElementById('stub_mode').value,
    threshold:    document.getElementById('threshold').value,
    retrain:      document.getElementById('retrain').value,
    xgboost:      document.getElementById('xgboost').value,
    mt5_account:  document.getElementById('mt5_account').value,
    mt5_password: document.getElementById('mt5_password').value,
    mt5_server:   document.getElementById('mt5_server').value,
  };

  await fetch('/api/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });

  const msg = document.getElementById('msg');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display='none', 3000);
}

loadSettings();
</script>
</body>
</html>
